<section class="page">
  <div class="page-header">
    <app-section-header
      [title]="'home.title' | t"
    />
    <button type="button" class="league-dialog-open" (click)="openLeagueDialog()">
      {{ 'home.showParams' | t }}
    </button>
  </div>

  @if (vm$ | async; as vm) {
    <section class="date-filter">
      <div class="quick-days">
        @for (offset of quickDateOffsets; track offset) {
          <button
            type="button"
            [attr.aria-label]="'home.selectDay' | t"
            [class.active]="isSelectedDate(offset, vm.selectedDate)"
            (click)="onQuickDateSelect(offset)"
          >
            {{ quickDateLabel(offset) }}
          </button>
        }
      </div>

      <label class="date-input">
        <input type="date" [attr.aria-label]="'home.selectDay' | t" [value]="vm.selectedDate" (change)="onDateInputChange($event)" />
      </label>
    </section>

    @if (vm.loading) {
      <app-skeleton-grid [count]="8" />
    } @else if (vm.error) {
      <app-error-message [title]="'home.errorTitle' | t" [message]="vm.error" />
    } @else if (!vm.matches.length) {
      <app-empty-state
        [title]="'home.emptyTitle' | t"
        [description]="'home.emptyDesc' | t"
      />
    } @else {
      <app-matches-list [matches]="vm.matches" />
    }

    @if (showLeagueDialog) {
      <div class="dialog-backdrop" (click)="closeLeagueDialog()"></div>
      <section class="league-dialog" role="dialog" aria-modal="true" [attr.aria-label]="'home.showParams' | t">
        <div class="league-dialog-header">
          <h3>{{ 'home.showParams' | t }}</h3>
          <button type="button" class="league-dialog-close" (click)="closeLeagueDialog()">
            {{ 'home.closeDialog' | t }}
          </button>
        </div>
        <app-league-filter
          [options]="vm.leagueOptions"
          [defaultLeagueIds]="vm.defaultLeagueIds"
          [selectedIds]="vm.selectedLeagueIds"
          (toggle)="onToggleLeague($event)"
          (clearAll)="onClearLeagues()"
          (selectDefaults)="onSelectDefaults()"
        />
      </section>
    }
  }
</section>
