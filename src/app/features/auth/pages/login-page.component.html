<section class="login-page">
  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()">
    <h1>{{ 'auth.login.title' | t }}</h1>
    <p>{{ 'auth.login.subtitle' | t }}</p>

    <label>
      <span>{{ 'auth.login.username' | t }}</span>
      <input type="text" formControlName="username" autocomplete="username" />
    </label>

    <label>
      <span>{{ 'auth.login.password' | t }}</span>
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>

    @if (errorKey()) {
      <p class="error">{{ errorKey()! | t }}</p>
    }

    <button type="submit">{{ 'auth.login.submit' | t }}</button>
  </form>
</section>
